[build]
  publish = "."

# --- Consolidate old domain: searchloscabos.com -> .tech ---
[[redirects]]
  from = "http://searchloscabos.com/*"
  to   = "https://searchwebservices.tech/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.searchloscabos.com/*"
  to   = "https://searchwebservices.tech/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://searchloscabos.com/*"
  to   = "https://searchwebservices.tech/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.searchloscabos.com/*"
  to   = "https://searchwebservices.tech/:splat"
  status = 301
  force = true

# --- Consolidate .tech: www -> apex ---
[[redirects]]
  from = "https://www.searchwebservices.tech/*"
  to   = "https://searchwebservices.tech/:splat"
  status = 301
  force = true

# Host-conditional fallbacks
[[redirects]]
  from = "/*"
  to   = "https://searchwebservices.tech/:splat"
  status = 301
  force = true
  conditions = { Host = ["searchloscabos.com", "www.searchloscabos.com"] }

[[redirects]]
  from = "/*"
  to   = "https://searchwebservices.tech/:splat"
  status = 301
  force = true
  conditions = { Host = ["www.searchwebservices.tech"] }

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache images
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
